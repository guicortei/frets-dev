<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>frets.dev offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: radial-gradient(circle at 20% 20%, #17243f 0%, #090c14 45%, #05070d 100%);
        color: #e2e8f0;
      }
      .card {
        max-width: 540px;
        margin: 24px;
        padding: 20px;
        border: 1px solid rgba(34, 211, 238, 0.25);
        border-radius: 14px;
        background: rgba(2, 6, 23, 0.72);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }
      p {
        margin: 0;
        line-height: 1.5;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <article class="card">
      <h1>You are offline</h1>
      <p>
        frets.dev is not connected right now. Reconnect to continue syncing and
        loading the latest content.
      </p>
    </article>
  </body>
</html>
